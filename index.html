<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="bg-slate-50">
    <header class="w-[70%] mx-auto">
        <h1 class="text-4xl font-bold text-[#002C5C] mt-15 mb-5"> Job Application Tracker</h1>
        <div class="header-card grid grid-cols-3 gap-4 ">
            <div class="total-card p-4 rounded-lg border-1 border-gray-200 bg-white">
                <p class="text-[#323B49] font-medium">Total</p>
                <p id="total" class="text-4xl font-bold text-[#002C5C]">0</p>
            </div>
            <div class="interview-card p-4 rounded-lg border-1 border-gray-200 bg-white">
                <p class="text-[#323B49] font-medium">Interview</p>
                <p id="total" class="text-4xl font-bold text-green-400">0</p>
            </div>
            <div class="reject-card p-4 rounded-lg border-1 border-gray-200 bg-white">
                <p class="text-[#323B49] font-medium">Rejected</p>
                <p id="total" class="text-4xl font-bold text-red-400">0</p>
            </div>
        </div>
    </header>
    <hr class="w-[70%] my-8 mx-auto border-gray-200">
    <main class="w-[70%] mx-auto">
        <div class="flex justify-between mb-6">
            <p class="text-2xl font-bold text-[#002C5C]">Available Jobs</p>
            <p class="text-gray-400 text-[16px] font-medium"> <span class="job number">8 </span> jobs</p>
        </div>
        <div class="flex gap-2">
            <button class="bg-blue-700 text-white border-1 border-gray-200 px-8 py-2 rounded-md"
                id="all-btn">All</button>
            <button class="bg-white border-1 border-gray-200 px-5 py-2  rounded-md"
                id="interview-btn">Interview</button>
            <button class="bg-white border-1 border-gray-200 px-5 py-2  rounded-md" id="rejected-btn">Rejected</button>
        </div>
    </main>
</body>

</html>
