<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="bg-slate-50">
    <header class="w-[70%] mx-auto">
        <h1 class="text-4xl font-bold text-[#002C5C] mt-15 mb-5"> Job Application Tracker</h1>
        <div class="header-card grid grid-cols-3 gap-4 ">
            <div class="total-card p-4 rounded-lg shadow  bg-white">
                <p class="text-[#323B49] font-medium">Total</p>
                <p id="total" class="text-4xl font-bold text-[#002C5C]">0</p>
            </div>
            <div class="interview-card p-4 rounded-lg shadow bg-white">
                <p class="text-[#323B49] font-medium">Interview</p>
                <p id="total" class="text-4xl font-bold text-green-400">0</p>
            </div>
            <div class="reject-card p-4 rounded-lg shadow bg-white">
                <p class="text-[#323B49] font-medium">Rejected</p>
                <p id="total" class="text-4xl font-bold text-red-400">0</p>
            </div>
        </div>
    </header>
    <hr class="w-[70%] my-8 mx-auto border-gray-200">
</body>

</html>
